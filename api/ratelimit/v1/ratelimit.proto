syntax = "proto3";

package ratelimit.v1;

// This tells the compiler where to put the generated Go code
option go_package = "github.com/NirajDonga/rl/api/ratelimit/v1;ratelimitv1";

// The gRPC service definition
service RateLimiterService {
  // Synchronous, low latency call as shown in your diagram
  rpc IsAllowed(IsAllowedRequest) returns (IsAllowedResponse) {}
}

// Enum to support multiple rate limiters
enum Algorithm {
  ALGORITHM_UNSPECIFIED = 0;
  ALGORITHM_TOKEN_BUCKET = 1;
  ALGORITHM_FIXED_WINDOW = 2;
  ALGORITHM_SLIDING_WINDOW = 3;
}

// The incoming request (Matches your current RateRequest struct)
message IsAllowedRequest {
  string key = 1;          // e.g., "user_ip:192.168.1.1" or "{clientA:user1}"
  int64 limit = 2;         // Maximum allowed requests/tokens
  int64 window_ms = 3;     // Time window in milliseconds
  Algorithm algorithm = 4; // Which algorithm the server should use
}

// The response back to the primary backend
message IsAllowedResponse {
  bool allowed = 1;        // true if request should proceed, false if rate limited
}